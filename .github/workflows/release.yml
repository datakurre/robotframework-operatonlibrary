name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed for gh release create

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: -Dpolyglot.engine.WarnInterpreterOnly=false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Set the Maven project version so artifact filenames match the tag.
      - name: Set Maven version
        run: |
          mvn -q versions:set \
            -DnewVersion=${{ steps.version.outputs.VERSION }} \
            -DgenerateBackupPoms=false

      # Set the Python proxy wheel version to match the tag.
      - name: Set Python proxy version
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.VERSION }}"/' \
            python/pyproject.toml

      # Full test run — graalpy-maven-plugin downloads Python wheels here;
      # subsequent steps are fast because ~/.m2 is cached.
      - name: Run tests
        run: mvn test

      - name: Build fat JAR
        run: mvn -Pshade package -DskipTests

      - name: Build Vasara fat JAR
        run: mvn -Pshade-vasara package -DskipTests

      # Uses Maven's managed test classpath — no need to run the fat JAR.
      - name: Generate Operaton.libspec
        run: |
          mkdir -p docs
          mvn -q exec:exec \
            -Dexec.executable=java \
            -Dexec.classpathScope=test \
            "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc docs/Operaton.libspec"

      - name: Build CPython proxy wheel
        run: |
          pip install --quiet build
          python -m build --wheel --outdir python/dist/ python/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          FAT_JAR="target/operaton-bpm-extension-robot-${VERSION}-fat.jar"
          VASARA_JAR="target/operaton-bpm-extension-robot-${VERSION}-vasara.jar"
          WHEEL=$(ls python/dist/*.whl | head -1)
          gh release create "$GITHUB_REF_NAME" \
            --title "operaton-robot $GITHUB_REF_NAME" \
            --generate-notes \
            "$FAT_JAR#Fat JAR (standard)" \
            "$VASARA_JAR#Fat JAR (Vasara form customizations)" \
            "docs/Operaton.libspec#Operaton.libspec (RobotCode keyword discovery)" \
            "$WHEEL#CPython proxy wheel"
