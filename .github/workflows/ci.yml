name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: -Dpolyglot.engine.WarnInterpreterOnly=false
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn -q test

      - name: Verify fat JAR excludes Vasara classes
        run: |
          mvn -q -Pshade package -DskipTests
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          ! jar tf "target/operaton-bpm-extension-robot-${VERSION}-fat.jar" | grep -q "fi/jyu/vasara/"

      - name: Verify Vasara JAR includes Vasara classes
        run: |
          mvn -q -Pshade-vasara package -DskipTests
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          jar tf "target/operaton-bpm-extension-robot-${VERSION}-vasara.jar" | grep -q "fi/jyu/vasara/"
