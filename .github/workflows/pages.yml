name: Pages

on:
  push:
    branches: [main]

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel in-progress if a newer run starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      MAVEN_OPTS: -Dpolyglot.engine.WarnInterpreterOnly=false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build (skip tests)
        run: mvn -q -DskipTests package

      - name: Generate Operaton.html
        run: |
          mkdir -p docs
          mvn -q exec:exec \
            -Dexec.executable=java \
            -Dexec.classpathScope=test \
            "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc docs/Operaton.html"

      - name: Generate Operaton.libspec
        run: |
          mvn -q exec:exec \
            -Dexec.executable=java \
            -Dexec.classpathScope=test \
            "-Dexec.args=-cp %classpath org.operaton.bpm.extension.robot.Libdoc docs/Operaton.libspec"

      - name: Write index.html redirect
        run: |
          cat > docs/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=Operaton.html">
            <title>Operaton Robot Framework Library</title>
          </head>
          <body>
            <p>Redirecting to <a href="Operaton.html">Operaton keyword reference</a>…</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
